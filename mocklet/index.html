      </ol>
      <h2>Frequently Asked Questions</h2>
      <dl>
        <dt><strong>What is a mock API?</strong></dt>
        <dd>A mock API is a simulated API endpoint that returns predefined responses. Developers use mock APIs to test frontend code, prototype integrations, and validate workflows without relying on a real backend.</dd>
        <dt><strong>Is Mocklet free?</strong></dt>
        <dd>Yes, Mocklet is completely free. No credit card, no paid tiers, no hidden limits for normal usage.</dd>
        <dt><strong>Do I need to sign up?</strong></dt>
        <dd>No. Mocklet requires no account, no API key, and no installation. Just define your routes and start testing.</dd>
        <dt><strong>How long do endpoints last?</strong></dt>
        <dd>Every mock endpoint auto-expires after 24 hours. This keeps things clean and is perfect for quick tests and CI/CD pipelines.</dd>
        <dt><strong>Can I use Mocklet for testing webhooks?</strong></dt>
        <dd>Yes. Mocklet captures every incoming request with full headers and body, making it ideal for inspecting webhook payloads during development.</dd>
      </dl>
